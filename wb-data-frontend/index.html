<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WB Data - 自助查询平台</title>
    <style>
      :root {
        color-scheme: light;
        --boot-bg: #f3f1ec;
        --boot-surface: #f8f7f4;
        --boot-line: rgba(120, 110, 90, 0.12);
        --boot-strong: rgba(120, 110, 90, 0.22);
        --boot-brand: #d97757;
        --boot-brand-soft: rgba(217, 119, 87, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(217, 119, 87, 0.08), transparent 30%),
          var(--boot-bg);
        font-family: "Geist Variable", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-shell {
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(248, 247, 244, 0.88), rgba(243, 241, 236, 0.96)),
          var(--boot-bg);
      }

      .boot-nav {
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        border-bottom: 1px solid var(--boot-line);
        background: color-mix(in srgb, var(--boot-surface) 92%, white);
      }

      .boot-nav-left,
      .boot-nav-right,
      .boot-brand,
      .boot-links {
        display: flex;
        align-items: center;
      }

      .boot-nav-left {
        gap: 28px;
      }

      .boot-brand {
        gap: 10px;
      }

      .boot-logo {
        width: 34px;
        height: 34px;
        border-radius: 11px;
        background: linear-gradient(135deg, #1a1a1a, #3d342e);
      }

      .boot-brand-line {
        width: 108px;
        height: 14px;
        border-radius: 999px;
      }

      .boot-links {
        gap: 14px;
      }

      .boot-link {
        width: 92px;
        height: 12px;
        border-radius: 999px;
      }

      .boot-user {
        width: 76px;
        height: 14px;
        border-radius: 999px;
      }

      .boot-content {
        width: min(1400px, 100%);
        margin: 0 auto;
        padding: 24px 28px 32px;
      }

      .boot-panel,
      .boot-toolbar {
        border: 1px solid var(--boot-line);
        border-radius: 18px;
        background: color-mix(in srgb, var(--boot-surface) 94%, white);
        box-shadow: 0 12px 24px rgba(80, 60, 40, 0.06);
      }

      .boot-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        margin-bottom: 14px;
      }

      .boot-search {
        flex: 1;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--boot-line);
      }

      .boot-button {
        width: 132px;
        height: 42px;
        border-radius: 12px;
      }

      .boot-panel {
        padding: 18px;
        overflow: hidden;
      }

      .boot-progress {
        height: 3px;
        width: 100%;
        margin-bottom: 14px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(217, 119, 87, 0.08);
      }

      .boot-progress::after {
        content: "";
        display: block;
        width: 38%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(217, 119, 87, 0.25), var(--boot-brand), rgba(217, 119, 87, 0.2));
        animation: boot-progress 1.1s cubic-bezier(0.2, 0.9, 0.25, 1) infinite;
      }

      .boot-row {
        display: grid;
        grid-template-columns: 1.5fr 0.8fr 1.2fr 0.7fr 0.7fr 0.9fr 0.7fr;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid rgba(120, 110, 90, 0.08);
      }

      .boot-row:last-child {
        border-bottom: none;
      }

      .boot-cell {
        height: 14px;
        border-radius: 999px;
      }

      .boot-skeleton {
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(217, 119, 87, 0.08), rgba(217, 119, 87, 0.18), rgba(217, 119, 87, 0.08)),
          var(--boot-surface);
        background-size: 180% 100%;
        animation: boot-shimmer 1.35s linear infinite;
      }

      @keyframes boot-shimmer {
        from {
          background-position: 180% 0;
        }
        to {
          background-position: -180% 0;
        }
      }

      @keyframes boot-progress {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(300%);
        }
      }

      @media (max-width: 900px) {
        .boot-nav {
          padding: 0 16px;
        }

        .boot-nav-left {
          gap: 16px;
        }

        .boot-links {
          gap: 10px;
        }

        .boot-link {
          width: 30px;
        }

        .boot-content {
          padding: 18px 16px 24px;
        }

        .boot-row {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell" aria-hidden="true">
        <div class="boot-nav">
          <div class="boot-nav-left">
            <div class="boot-brand">
              <div class="boot-logo"></div>
              <div class="boot-brand-line boot-skeleton"></div>
            </div>
            <div class="boot-links">
              <div class="boot-link boot-skeleton"></div>
              <div class="boot-link boot-skeleton"></div>
              <div class="boot-link boot-skeleton"></div>
            </div>
          </div>
          <div class="boot-nav-right">
            <div class="boot-user boot-skeleton"></div>
          </div>
        </div>
        <div class="boot-content">
          <div class="boot-toolbar">
            <div class="boot-search boot-skeleton"></div>
            <div class="boot-button boot-skeleton"></div>
          </div>
          <div class="boot-panel">
            <div class="boot-progress"></div>
            <div class="boot-row">
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
            </div>
            <div class="boot-row">
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
            </div>
            <div class="boot-row">
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
            </div>
            <div class="boot-row">
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
              <div class="boot-cell boot-skeleton"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
